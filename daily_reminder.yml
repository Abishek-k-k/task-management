name: Daily Task Reminder

on:
  schedule:
    # Runs every day at 7:00 AM IST (01:30 UTC)
    # Adjust the UTC time to match your preferred local time
    # IST = UTC + 5:30, so 7:00 AM IST = 01:30 UTC
    - cron: '30 1 * * *'
  workflow_dispatch:   # lets you trigger it manually from GitHub too

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install schedule

      - name: Run one-shot reminder
        run: python send_once.py
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PWD: ${{ secrets.GMAIL_APP_PWD }}
